swagger: "2.0"
info:
  title: DP Service Request API
  version: "1.0.0"
host: "dp-service-gateway-4cc9cj5l.uc.gateway.dev"
x-google-backend:
  address: "https://dp-service-assistant-cd-deploy-340319339769.us-central1.run.app"
  protocol: h2
securityDefinitions:
  api_key:
    type: "apiKey"
    name: "x-api-key"
    in: "header"
security:
  - api_key: []
consumes:
  - application/json
produces:
  - application/json
paths:
  /health:
    get:
      operationId: healthCheck
      security:
        - api_key: []
      x-google-backend:
        address: "https://dp-service-assistant-cd-deploy-340319339769.us-central1.run.app/health"
      responses:
        200:
          description: OK
        401:
          description: Unauthorized
  /api/v1/service-request:
    post:
      operationId: receiveServiceRequest
      security:
        - api_key: []
      x-google-backend:
        address: "https://dp-service-assistant-cd-deploy-340319339769.us-central1.run.app/api/v1/service-request"
      parameters:
        - in: body
          name: payload
          required: true
          schema:
            type: object
            required: [user_id, metadata]
            properties:
              user_id:
                type: string
              metadata:
                type: object
                required: [domain, database, role, user_email]
                properties:
                  domain:
                    type: string
                  database:
                    type: string
                  role:
                    type: string
                  user_email:
                    type: string
      responses:
        200:
          description: Ticket created
        401:
          description: Unauthorized
        422:
          description: Validation error
        502:
          description: Freshservice error
